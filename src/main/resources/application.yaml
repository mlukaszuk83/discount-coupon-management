spring:
  application:
    name: coupon

  datasource:
    url: jdbc:postgresql://postgres:5432/mydatabase
    username: myuser
    password: secret

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.jml: DEBUG